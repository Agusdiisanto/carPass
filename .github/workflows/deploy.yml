name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- Validacion de contratos (Hardhat, raiz del repo) ---
  contracts-validate:
    name: Contracts / compile + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run compile

      - run: npm run test:contracts

  # --- Validacion de frontend (Vite + React, carpeta frontend/) ---
  frontend-validate:
    name: Frontend / lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build

  # --- Deploy a Vercel: SOLO en push a main, y solo si las dos validaciones anteriores pasaron ---
  # Esta seccion asume Vercel como proveedor (vercel.json + .vercel/project.json ya existen en el repo).
  # Si el proyecto de Vercel ya tiene la "Git Integration" nativa activada (deploy automatico
  # desde el dashboard de Vercel), desactivala antes de usar este job para no duplicar deploys:
  # Vercel Dashboard -> Project -> Settings -> Git -> Disconnect / Ignored Build Step.
  deploy:
    name: Deploy / Vercel (production)
    needs: [contracts-validate, frontend-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ------------------------------------------------------------------
  # Nota deliberada: el deploy de los contratos (Sepolia) NO esta en este
  # workflow. Requiere DEPLOYER_PRIVATE_KEY + fondos y es una accion manual
  # y deliberada (ver docs/DEPLOY.md y .agents/backlog.md, EPIC-08). Se sigue
  # ejecutando a mano con `npm run deploy:sepolia` y el resto de la receta.
  # ------------------------------------------------------------------
